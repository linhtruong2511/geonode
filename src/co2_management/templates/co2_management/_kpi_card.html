{# Partial: _kpi_card.html — dùng {% include %} với: value, label, icon, color, suffix, sparkline_id #}
<div class="col-xl-3 col-md-6 col-12 d-flex" style="margin-bottom: 24px;">
  <div class="co2-card kpi-card w-100" style="margin-bottom: 0; position: relative; overflow: hidden; display: flex; flex-direction: column;">
    <div class="co2-card-body" style="padding: 20px; text-align: left; flex: 1;">
      <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
        <div class="kpi-icon-wrap" style="background: {{ color|default:'var(--color-accent-primary)' }}20; padding: 10px; border-radius: 8px;">
           <i class="fa {{ icon }}" style="color: {{ color|default:'var(--color-accent-primary)' }}; font-size: 20px;"></i>
        </div>
        {% if sparkline_id %}
        <div style="width: 80px; height: 35px;">
           <canvas id="{{ sparkline_id }}"></canvas>
        </div>
        {% endif %}
      </div>
      
      <div class="font-mono" style="font-size: 24px; font-weight: 700; color: var(--color-text-primary); line-height: 1.2;">
        {{ value|default:"0"|floatformat:"-2" }}<span style="font-size: 14px; margin-left: 2px; color: var(--color-text-secondary); font-weight: 500;">{{ suffix }}</span>
      </div>
      
      <div style="color: var(--color-text-secondary); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px; margin-top: 6px;">
        {{ label }}
      </div>
    </div>
  </div>
</div>
