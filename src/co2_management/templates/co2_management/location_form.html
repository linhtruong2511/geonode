{% extends "co2_management/co2_base.html" %}
{% load i18n %}

{% block co2_content %}
  <div class="co2-card">
    <div class="co2-card-body">
      <form id="co2-location-form" method="post">
        {% csrf_token %}
        <div class="row">
          <div class="col-sm-12">
            <div class="form-group">
              <label>{% trans "Tên vị trí giám sát" %}</label>
              <input type="text" name="location_name" class="form-control" required>
            </div>
          </div>
          <div class="col-sm-12">
            <div class="form-group">
              <label>{% trans "Loại vị trí" %}</label>
              <select name="location_type" class="form-control" required>
                <option value="CITY">{% trans "Thành phố" %}</option>
                <option value="REGION">{% trans "Khu vực" %}</option>
                <option value="INDUSTRIAL">{% trans "Khu công nghiệp" %}</option>
                <option value="RESEARCH">{% trans "Trạm nghiên cứu" %}</option>
              </select>
            </div>
          </div>
          <div class="col-sm-6">
            <div class="form-group">
              <label>{% trans "Vĩ độ (Lat)" %}</label>
              <input type="number" step="any" id="id_latitude" name="latitude" class="form-control" required>
            </div>
          </div>
          <div class="col-sm-6">
            <div class="form-group">
              <label>{% trans "Kinh độ (Lng)" %}</label>
              <input type="number" step="any" id="id_longitude" name="longitude" class="form-control" required>
            </div>
          </div>
          <div class="col-sm-12">
            <div class="form-group">
              <label>{% trans "Bán kính (km)" %}</label>
              <input type="number" step="0.1" name="radius_km" class="form-control" required value="50.0">
              <p class="help-block text-muted" style="font-size: 12px;">{% trans "Click vào bản đồ bên phải để tự động điền tọa độ." %}</p>
            </div>
          </div>
        </div>
        <div style="margin-top: 15px;">
          <button type="submit" class="btn btn-accent">{% trans "Lưu vị trí" %}</button>
          <a href="{% url 'co2_management:location_list' %}" class="btn btn-default">{% trans "Hủy" %}</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}

{% block co2_scripts %}
  {{ block.super }}
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Map picker logic
      setTimeout(() => {
        if (window.CO2Map && window.CO2Map.map) {
          window.CO2Map.map.on('click', function(e) {
            document.getElementById('id_latitude').value = e.latlng.lat.toFixed(4);
            document.getElementById('id_longitude').value = e.latlng.lng.toFixed(4);
            
            // Show marker
            if(window.pickerMarker) {
              window.pickerMarker.setLatLng(e.latlng);
            } else {
              window.pickerMarker = L.marker(e.latlng).addTo(window.CO2Map.map);
            }
          });
        }
      }, 500);
    });
  </script>
{% endblock %}
