{% extends "co2_management/co2_base.html" %}
{% load i18n %}

{% block co2_content %}
  <div class="co2-card">
    <div class="co2-card-body">
      <form id="co2-job-form" method="post">
        {% csrf_token %}
        <div class="row">
          <div class="col-sm-12">
            <div class="form-group">
              <label>{% trans "Tên phiên phân tích" %}</label>
              <input type="text" name="job_name" class="form-control" required placeholder="Ví dụ: Phân tích đợt 1...">
            </div>
          </div>
          <div class="col-sm-12">
            <div class="form-group">
              <label>{% trans "Loại công việc" %}</label>
              <select name="job_type" class="form-control" required>
                <option value="IMPORT">{% trans "Nhập dữ liệu vệ tinh" %}</option>
                <option value="CROSS_VALIDATION">{% trans "Chéo hóa (Cross-validation)" %}</option>
                <option value="ANOMALY_DETECTION">{% trans "Phát hiện bất thường" %}</option>
              </select>
            </div>
          </div>
          <div class="col-sm-12">
            <div class="form-group">
              <label>{% trans "Tham số (JSON)" %}</label>
              <textarea name="parameters" class="form-control" rows="5" placeholder='{"radius": 50, "threshold": 2.5}'></textarea>
            </div>
          </div>
        </div>
        <div style="margin-top: 15px;">
          <button type="submit" class="btn btn-accent">{% trans "Khởi tạo" %}</button>
          <a href="{% url 'co2_management:job_list' %}" class="btn btn-default">{% trans "Hủy" %}</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
